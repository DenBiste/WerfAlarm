<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gids — Route Info</title>
<meta name="description" content="Zo werkt Route Info: video, stap-voor-stapgids en veelgestelde vragen — in het Nederlands of Engels.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚴</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=23">
<style>
  .gids{max-width:1000px;margin:0 auto;padding:clamp(28px,4vw,56px) clamp(16px,4vw,44px)}
  .gids .mega{font-size:clamp(44px,8vw,110px)}
  .gids-intro{font-size:clamp(15px,1.5vw,18px);max-width:62ch;margin:18px 0 34px}
  .video-frame{border:2px solid var(--ink);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:var(--ink)}
  .video-frame video{display:block;width:100%;height:auto}
  .video-caption{font-size:13px;color:var(--muted);margin:12px 2px 0}
  .gstep{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:26px;align-items:start;
    margin-top:clamp(36px,5vw,56px);padding-top:clamp(24px,3vw,36px);border-top:2px solid var(--ink)}
  .gstep:nth-of-type(even){grid-template-columns:minmax(0,1.15fr) minmax(0,1fr)}
  .gstep:nth-of-type(even) .gtext{order:2}
  .gtext h2{font-weight:900;font-stretch:116%;text-transform:uppercase;font-size:clamp(22px,2.6vw,30px);margin:10px 0 10px}
  .gtext p{margin:0 0 12px;font-size:15px}
  .gtext .tip{background:var(--paper);border:2px solid var(--ink);border-radius:12px;box-shadow:var(--shadow-sm);padding:12px 14px;font-size:14px;margin-top:14px}
  .gtext .tip b{color:var(--orange-deep)}
  .shot{border:2px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;background:#fff}
  .shot img{display:block;width:100%;height:auto}
  .shot figcaption{font-size:12.5px;color:var(--muted);padding:8px 12px;border-top:2px solid var(--ink);background:var(--paper)}
  .shot + .shot{margin-top:18px}
  kbd,.ui{font:inherit;font-weight:700;font-size:.9em;background:var(--paper);border:1.5px solid var(--ink);border-radius:6px;padding:0 6px;box-shadow:2px 2px 0 var(--ink);white-space:nowrap}
  .faq{margin-top:clamp(40px,5vw,60px);padding-top:clamp(24px,3vw,36px);border-top:2px solid var(--ink)}
  .faq h2{font-weight:900;font-stretch:116%;text-transform:uppercase;font-size:clamp(22px,2.6vw,30px)}
  .faq details{background:var(--paper);border:2px solid var(--ink);border-radius:12px;box-shadow:var(--shadow-sm);padding:14px 18px;margin-bottom:12px}
  .faq summary{font-weight:800;cursor:pointer;font-size:15px}
  .faq p{font-size:14.5px;margin:10px 0 0}
  .backcta{margin-top:clamp(36px,5vw,56px);text-align:center}
  @media(max-width:760px){.gstep,.gstep:nth-of-type(even){grid-template-columns:1fr}.gstep:nth-of-type(even) .gtext{order:0}}
</style>
</head>
<body>

<nav class="topbar">
  <span class="brand"><span class="brand-stripe"></span>ROUTE<em>&nbsp;INFO</em></span>
  <a class="navlink" href="index.html#hoe" data-i18n="navStart">Start</a>
  <a class="navlink" href="gids.html" aria-current="page"><b data-i18n="navGids">Gids</b></a>
  <div class="seg lang" role="group" aria-label="Taal / Language">
    <button type="button" class="seg-btn lang-btn" data-lang="nl" aria-pressed="true">NL</button>
    <button type="button" class="seg-btn lang-btn" data-lang="en" aria-pressed="false">EN</button>
  </div>
  <a class="navlink navlink-cta" href="index.html#app" data-i18n="navCheck">Naar de check ↓</a>
</nav>

<main class="gids">
  <h1 class="mega"><span class="mega-line"><span data-i18n="g_title">DE </span><span class="hl" data-i18n="g_titleHl">GIDS</span><span class="dot">.</span></span></h1>
  <p class="gids-intro" data-i18n-html="g_intro"></p>

  <div class="video-frame">
    <video controls preload="metadata" poster="assets/gids-poster.png" playsinline>
      <source src="assets/gids.mp4" type="video/mp4">
      <a href="assets/gids.mp4">gids.mp4</a>
    </video>
  </div>
  <p class="video-caption" data-i18n-html="g_videoCap"></p>

  <section class="gstep">
    <div class="gtext">
      <span class="step-nr" data-i18n="g_s1nr">STAP 01</span>
      <h2 data-i18n="g_s1t"></h2>
      <div data-i18n-html="g_s1p"></div>
    </div>
    <div>
      <figure class="shot"><img src="assets/img/stap1-laden.png" alt="">
        <figcaption data-i18n="g_s1c1"></figcaption></figure>
      <figure class="shot"><img src="assets/img/stap1-geladen.png" alt="">
        <figcaption data-i18n="g_s1c2"></figcaption></figure>
    </div>
  </section>

  <section class="gstep">
    <div class="gtext">
      <span class="step-nr" data-i18n="g_s2nr">STAP 02</span>
      <h2 data-i18n="g_s2t"></h2>
      <div data-i18n-html="g_s2p"></div>
    </div>
    <div>
      <figure class="shot"><img src="assets/img/stap2-instellingen.png" alt="">
        <figcaption data-i18n="g_s2c1"></figcaption></figure>
    </div>
  </section>

  <section class="gstep">
    <div class="gtext">
      <span class="step-nr" data-i18n="g_s3nr">STAP 03</span>
      <h2 data-i18n="g_s3t"></h2>
      <div data-i18n-html="g_s3p"></div>
    </div>
    <div>
      <figure class="shot"><img src="assets/img/stap3-bevraging.png" alt="">
        <figcaption data-i18n="g_s3c1"></figcaption></figure>
      <figure class="shot"><img src="assets/img/stap4-resultaat.png" alt="">
        <figcaption data-i18n="g_s3c2"></figcaption></figure>
    </div>
  </section>

  <section class="gstep">
    <div class="gtext">
      <span class="step-nr" data-i18n="g_s4nr">STAP 04</span>
      <h2 data-i18n="g_s4t"></h2>
      <div data-i18n-html="g_s4p"></div>
    </div>
    <div>
      <figure class="shot"><img src="assets/img/stap4-detail.png" alt="">
        <figcaption data-i18n="g_s4c1"></figcaption></figure>
    </div>
  </section>

  <section class="faq">
    <h2 data-i18n="g_faqT">Goed om te weten</h2>
    <details>
      <summary data-i18n="g_q1"></summary><p data-i18n-html="g_a1"></p>
    </details>
    <details>
      <summary data-i18n="g_q2"></summary><p data-i18n-html="g_a2"></p>
    </details>
    <details>
      <summary data-i18n="g_q3"></summary><p data-i18n-html="g_a3"></p>
    </details>
    <details>
      <summary data-i18n="g_q4"></summary><p data-i18n-html="g_a4"></p>
    </details>
    <details>
      <summary data-i18n="g_q5"></summary><p data-i18n-html="g_a5"></p>
    </details>
    <details>
      <summary data-i18n="g_q6"></summary><p data-i18n-html="g_a6"></p>
    </details>
  </section>

  <div class="backcta">
    <a class="btn btn-primary btn-big" href="index.html#app"><span data-i18n="g_cta">Zelf proberen</span> <span class="arrow">→</span></a>
  </div>
</main>

<footer class="footer">
  <div class="barrier thin" aria-hidden="true"></div>
  <div class="footer-inner">
    <span><b>Route Info</b> · <span data-i18n="footTag">route-briefing voor fietsers</span></span>
    <span data-i18n-html="footSrc"></span>
  </div>
</footer>

<script src="js/i18n.js?v=23"></script>

</html>
